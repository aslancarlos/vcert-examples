# =============================================================================
# VCERT PLAYBOOK - AWS ALB / NLB (via ACM - AWS Certificate Manager)
# =============================================================================
# AWS Load Balancers (Application and Network) use ACM certificates, referenced
# by ARN in the HTTPS/TLS listener. Re-importing to the SAME ARN updates the
# certificate without touching the listener.
#
# Strategy: VCERT issues the PEM (cert, chain, key) and the post-renew runs
# `aws acm import-certificate` reusing the existing ARN. The machine needs the
# AWS CLI authenticated (profile/instance role) with ACM permission.
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   export AWS_REGION="us-east-1"
#   export ACM_CERT_ARN="arn:aws:acm:us-east-1:123456789012:certificate/xxxxxxxx"
#   vcert run -f playbooks/aws-acm.yaml
#
# First time (no ARN): leave ACM_CERT_ARN empty; the script imports and logs the
# new ARN for you to attach to the listener and store in the variable afterward.
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: aws-acm-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "www.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Cloud"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "www.yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\AWS"

    installations:
      - format: PEM
        file: "/etc/vcert/aws/www.crt"
        chainFile: "/etc/vcert/aws/www.chain.crt"
        keyFile: "/etc/vcert/aws/www.key"
        backupFiles: true

        # POST: imports/re-imports the certificate into ACM (reuses the ARN if set).
        afterInstallAction: "/usr/local/bin/post-renew-aws-acm.sh"
