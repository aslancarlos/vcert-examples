# =============================================================================
# VCERT PLAYBOOK - Apache Tomcat
# =============================================================================
# Tomcat typically uses a keystore. Here we use PKCS#12 (the modern, recommended
# format instead of JKS). In server.xml, point the Connector to it:
#
#   <Connector port="8443" protocol="org.apache.coyote.http11.Http11NioProtocol"
#              SSLEnabled="true">
#     <SSLHostConfig>
#       <Certificate certificateKeystoreFile="/etc/tomcat/certs/app.p12"
#                    certificateKeystorePassword="${VCERT_P12_PASS}"
#                    certificateKeystoreType="PKCS12" />
#     </SSLHostConfig>
#   </Connector>
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   export VCERT_P12_PASS="strong_keystore_password"
#   vcert run -f playbooks/tomcat.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: tomcat-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "app.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Java Applications"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "app.yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\Tomcat"

    installations:
      # PKCS#12 (recommended). For JKS, switch format to JKS and use jksAlias/jksPassword.
      - format: PKCS12
        file: "/etc/tomcat/certs/app.p12"
        password: "{{ Env \"VCERT_P12_PASS\" }}"
        backupFiles: true

        # POST: restarts Tomcat to reload the keystore.
        afterInstallAction: "/usr/local/bin/post-renew-tomcat.sh"

      # ---- JKS alternative (uncomment and remove the PKCS12 block above) ----
      # - format: JKS
      #   file: "/etc/tomcat/certs/app.jks"
      #   jksAlias: "app"
      #   jksPassword: "{{ Env \"VCERT_JKS_PASS\" }}"
      #   backupFiles: true
      #   afterInstallAction: "/usr/local/bin/post-renew-tomcat.sh"
