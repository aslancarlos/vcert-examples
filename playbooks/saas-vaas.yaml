# =============================================================================
# VCERT PLAYBOOK - CyberArk Certificate Manager SaaS (formerly Venafi as a Service)
# =============================================================================
# Run:
#   export VCERT_APIKEY="your_api_key"
#   vcert run -f playbooks/saas-vaas.yaml
# =============================================================================

config:
  connection:
    platform: vaas
    url: "https://api.venafi.cloud"   # adjust if your region differs (e.g., api.eu.venafi.cloud)
    credentials:
      apiKey: "{{ Env \"VCERT_APIKEY\" }}"

certificateTasks:
  - name: saas-app-certificate

    # Lead time to start renewal
    renewBefore: 30d

    request:
      csr: local

      subject:
        commonName: "api.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Platform"
        locality: "New York"
        province: "NY"
        country: "US"

      keyType: rsa
      keySize: 2048

      sanDNS:
        - "api.yourcompany.com"

      validDays: 90

      # On SaaS, the "zone" is the Application\IssuingTemplate pair (team alias).
      zone: "MyApp\\Default"

    installations:
      - format: PEM
        file: "/etc/ssl/api/api.crt"
        chainFile: "/etc/ssl/api/chain.crt"
        keyFile: "/etc/ssl/api/api.key"
        backupFiles: true
        # afterInstallAction is the only action hook (runs after install).
        # For pre-steps, wrap with scripts/vcert-run.sh (no native pre hook).
        afterInstallAction: "/usr/local/bin/post-renew.sh"
