# =============================================================================
# VCERT PLAYBOOK - HAProxy
# =============================================================================
# HAProxy expects a SINGLE PEM file containing, in this order:
#   certificate + chain (intermediates) + private key
#
# VCERT writes the PEM files separately (cert, chain, key). The post-renewal
# script (post-renew-haproxy.sh) concatenates everything into the file HAProxy
# uses and reloads the service without downtime (reload).
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   vcert run -f playbooks/haproxy.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: haproxy-certificate

    # Lead time to start renewal
    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "lb.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Infrastructure"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "lb.yourcompany.com"
        - "www.yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\HAProxy"

    installations:
      - format: PEM
        # Separate files that VCERT writes:
        file: "/etc/haproxy/certs/lb.crt"
        chainFile: "/etc/haproxy/certs/lb.chain.crt"
        keyFile: "/etc/haproxy/certs/lb.key"
        backupFiles: true

        # POST: concatenates cert+chain+key into /etc/haproxy/certs/lb.pem and reloads.
        afterInstallAction: "/usr/local/bin/post-renew-haproxy.sh"
