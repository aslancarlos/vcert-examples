# =============================================================================
# VCERT PLAYBOOK - Same issuance in multiple formats (PEM + PKCS12 + JKS)
# =============================================================================
# Useful when the same certificate must serve different services:
#   - PEM    -> nginx / Apache / HAProxy
#   - PKCS12 -> .NET / Windows apps / some load balancers
#   - JKS    -> Java / Tomcat
#
# Each installation has its own pre/post actions.
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: multi-service-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "svc.yourcompany.com"
        organization: "Your Company Inc."
        organizationalUnits:
          - "Infrastructure"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 3072
      sanDNS:
        - "svc.yourcompany.com"
      validDays: 365
      zone: "Certificates\\Production\\Services"

    installations:
      # ---- 1) PEM for nginx ----
      - format: PEM
        file: "/etc/ssl/svc/svc.crt"
        chainFile: "/etc/ssl/svc/chain.crt"
        keyFile: "/etc/ssl/svc/svc.key"
        backupFiles: true
        afterInstallAction: "systemctl reload nginx"

      # ---- 2) PKCS#12 for a .NET app ----
      - format: PKCS12
        file: "/etc/ssl/svc/svc.p12"
        password: "{{ Env \"VCERT_P12_PASS\" }}"
        backupFiles: true
        afterInstallAction: "systemctl restart my-dotnet-app"

      # ---- 3) JKS for Tomcat ----
      - format: JKS
        file: "/etc/ssl/svc/svc.jks"
        jksAlias: "svc"
        jksPassword: "{{ Env \"VCERT_JKS_PASS\" }}"
        backupFiles: true
        afterInstallAction: "systemctl restart tomcat"
