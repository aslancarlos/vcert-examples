# =============================================================================
# VCERT PLAYBOOK - Azure Application Gateway
# =============================================================================
# The Application Gateway does not read local files: the certificate must be
# uploaded to the gateway (or to a Key Vault it references).
#
# Strategy: VCERT issues a PKCS#12 (.pfx) locally and the post-renew uploads it
# to the Application Gateway via the Azure CLI (az). The machine must have `az`
# authenticated (az login / managed identity) with permission on the resource.
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   export VCERT_P12_PASS="strong_pfx_password"
#   export AZ_RESOURCE_GROUP="rg-network"
#   export AZ_APPGW_NAME="appgw-prod"
#   export AZ_CERT_NAME="cert-www"
#   vcert run -f playbooks/azure-appgw.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: azure-appgw-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "www.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Cloud"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "www.yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\Azure"

    installations:
      - format: PKCS12
        file: "/etc/vcert/azure/www.pfx"
        password: "{{ Env \"VCERT_P12_PASS\" }}"
        backupFiles: true

        # POST: uploads the .pfx to the Application Gateway via the Azure CLI.
        afterInstallAction: "/usr/local/bin/post-renew-azure-appgw.sh"
