# =============================================================================
# VCERT PLAYBOOK - Nginx
# =============================================================================
# O Nginx usa duas diretivas:
#   ssl_certificate      -> certificado + cadeia (fullchain) no MESMO arquivo
#   ssl_certificate_key  -> chave privada (arquivo separado)
#
# O vcert grava cert, chain e key separados. O post-renew-nginx.sh monta o
# fullchain (cert + chain) e faz reload sem downtime apos validar a config.
#
# Executar:
#   export VCERT_TOKEN="seu_access_token"
#   vcert run -f playbooks/nginx.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.suaempresa.com.br/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: certificado-nginx

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "www.suaempresa.com.br"
        organization: "Sua Empresa S.A."            # O
        organizationalUnits:                         # OU
          - "Tecnologia da Informacao"
        locality: "Sao Paulo"
        province: "SP"
        country: "BR"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "www.suaempresa.com.br"
        - "suaempresa.com.br"
      validDays: 90
      zone: "Certificates\\Producao\\Nginx"

    installations:
      - format: PEM
        file: "/etc/nginx/certs/www.crt"
        chainFile: "/etc/nginx/certs/www.chain.crt"
        keyFile: "/etc/nginx/certs/www.key"
        backupFiles: true

        # POS: monta fullchain (cert+chain), valida (nginx -t) e reload.
        afterInstallAction: "/usr/local/bin/post-renew-nginx.sh"
