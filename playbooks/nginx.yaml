# =============================================================================
# VCERT PLAYBOOK - Nginx
# =============================================================================
# Nginx uses two directives:
#   ssl_certificate      -> certificate + chain (fullchain) in the SAME file
#   ssl_certificate_key  -> private key (separate file)
#
# VCERT writes cert, chain, and key separately. post-renew-nginx.sh builds the
# fullchain (cert + chain) and reloads without downtime after validating the config.
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   vcert run -f playbooks/nginx.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: nginx-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "www.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Information Technology"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "www.yourcompany.com"
        - "yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\Nginx"

    installations:
      - format: PEM
        file: "/etc/nginx/certs/www.crt"
        chainFile: "/etc/nginx/certs/www.chain.crt"
        keyFile: "/etc/nginx/certs/www.key"
        backupFiles: true

        # POST: builds the fullchain (cert+chain), validates (nginx -t), and reloads.
        afterInstallAction: "/usr/local/bin/post-renew-nginx.sh"
