# =============================================================================
# VCERT PLAYBOOK - Windows / IIS (Internet Information Services)
# =============================================================================
# No Windows o vcert instala o certificado direto no Windows Certificate Store
# (CAPI). Em seguida, o afterInstallAction (executado via powershell.exe)
# faz o bind do certificado no site do IIS.
#
# Executar (PowerShell, como Administrador):
#   $env:VCERT_TOKEN = "seu_access_token"
#   .\vcert.exe run -f playbooks\windows-iis.yaml
#
# Validar sem aplicar:  .\vcert.exe run -f playbooks\windows-iis.yaml --validate
# Forcar renovacao:     .\vcert.exe run -f playbooks\windows-iis.yaml --force-renew
#
# Agendamento: use o Agendador de Tarefas do Windows (Task Scheduler) para
# rodar este comando 2x/dia. O vcert so renova dentro da janela renewBefore.
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.suaempresa.com.br/vedsdk"
    credentials:
      # Le da variavel de ambiente VCERT_TOKEN (nao versione o token!)
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"
      # trustBundle: "C:\\certs\\cyberark-chain.pem"  # CA interna, se necessario

certificateTasks:
  - name: certificado-iis

    # === PRAZO PARA INICIAR A RENOVACAO ===
    renewBefore: 30d

    request:
      # No Windows com CAPI, a chave e gerada e armazenada no proprio store.
      csr: local

      # === DADOS DO CSR (Subject / DN) ===
      subject:
        commonName: "site.suaempresa.com.br"
        organization: "Sua Empresa S.A."            # O
        organizationalUnits:                         # OU
          - "Tecnologia da Informacao"
        locality: "Sao Paulo"                        # L
        province: "SP"                               # ST
        country: "BR"                                # C

      # === ALGORITMO E TAMANHO DE CHAVE ===
      keyType: rsa
      keySize: 2048          # 2048 / 3072 / 4096
      # Alternativa ECDSA:
      # keyType: ecdsa
      # keyCurve: P256

      # === SANs ===
      sanDNS:
        - "site.suaempresa.com.br"
        - "www.suaempresa.com.br"

      # === PERIODO DE VALIDADE (dias) ===
      validDays: 90

      # === POLITICA / ZONE ===
      zone: "Certificates\\Producao\\IIS"

    installations:
      # === Instalacao no Windows Certificate Store (CAPI) ===
      - format: CAPI
        # Local do store: LocalMachine\My (computador) ou CurrentUser\My (usuario).
        capiLocation: "LocalMachine\\My"
        # Nome amigavel exibido no console de certificados (mmc).
        capiFriendlyName: "site.suaempresa.com.br (VCERT)"
        # true = chave privada NAO exportavel (mais seguro). false = exportavel.
        capiIsNonExportable: true
        # Faz backup antes de sobrescrever na renovacao.
        backupFiles: true

        # === ACAO POS-RENOVACAO ===
        # Executado via powershell.exe. Faz o bind do novo certificado no IIS.
        # Passa o site e o hostname como argumentos para o script.
        afterInstallAction: "powershell.exe -ExecutionPolicy Bypass -File C:\\vcert\\scripts\\post-renew-iis.ps1 -SiteName 'Default Web Site' -HostHeader 'site.suaempresa.com.br' -FriendlyName 'site.suaempresa.com.br (VCERT)'"

        # === ACAO PRE-RENOVACAO (opcional) ===
        # beforeInstallAction: "powershell.exe -ExecutionPolicy Bypass -Command \"Write-Output '[PRE] Iniciando renovacao IIS' | Out-File -Append C:\\vcert\\vcert.log\""
