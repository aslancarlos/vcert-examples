# =============================================================================
# VCERT PLAYBOOK - Windows / IIS (Internet Information Services)
# =============================================================================
# On Windows, VCERT installs the certificate directly into the Windows
# Certificate Store (CAPI). Then the afterInstallAction (run via powershell.exe)
# binds the certificate to the IIS site.
#
# Run (PowerShell, as Administrator):
#   $env:VCERT_TOKEN = "your_access_token"
#   .\vcert.exe run -f playbooks\windows-iis.yaml
#
# Validate without applying:  .\vcert.exe run -f playbooks\windows-iis.yaml --validate
# Force renewal:              .\vcert.exe run -f playbooks\windows-iis.yaml --force-renew
#
# Scheduling: use the Windows Task Scheduler to run this command twice a day.
# VCERT only renews within the renewBefore window.
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      # Read from the VCERT_TOKEN environment variable (do not version the token!)
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"
      # trustBundle: "C:\\certs\\cyberark-chain.pem"  # internal CA, if needed

certificateTasks:
  - name: iis-certificate

    # === LEAD TIME TO START RENEWAL ===
    renewBefore: 30d

    request:
      # On Windows with CAPI, the key is generated and stored in the store itself.
      csr: local

      # === CSR DETAILS (Subject / DN) ===
      subject:
        commonName: "site.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Information Technology"
        locality: "New York"                         # L
        province: "NY"                               # ST
        country: "US"                                # C

      # === ALGORITHM AND KEY SIZE ===
      keyType: rsa
      keySize: 2048          # 2048 / 3072 / 4096
      # ECDSA alternative:
      # keyType: ecdsa
      # keyCurve: P256

      # === SANs ===
      sanDNS:
        - "site.yourcompany.com"
        - "www.yourcompany.com"

      # === VALIDITY PERIOD (days) ===
      validDays: 90

      # === POLICY / ZONE ===
      zone: "Certificates\\Production\\IIS"

    installations:
      # === Install into the Windows Certificate Store (CAPI) ===
      - format: CAPI
        # Store location: LocalMachine\My (computer) or CurrentUser\My (user).
        capiLocation: "LocalMachine\\My"
        # Friendly name shown in the certificate console (mmc).
        capiFriendlyName: "site.yourcompany.com (VCERT)"
        # true = private key NOT exportable (more secure). false = exportable.
        capiIsNonExportable: true
        # Back up before overwriting on renewal.
        backupFiles: true

        # === POST-RENEWAL ACTION ===
        # Run via powershell.exe. Binds the new certificate to IIS.
        # Passes the site and hostname as arguments to the script.
        afterInstallAction: "powershell.exe -ExecutionPolicy Bypass -File C:\\vcert\\scripts\\post-renew-iis.ps1 -SiteName 'Default Web Site' -HostHeader 'site.yourcompany.com' -FriendlyName 'site.yourcompany.com (VCERT)'"

        # === PRE-RENEWAL ACTION (optional) ===
        # beforeInstallAction: "powershell.exe -ExecutionPolicy Bypass -Command \"Write-Output '[PRE] Starting IIS renewal' | Out-File -Append C:\\vcert\\vcert.log\""
