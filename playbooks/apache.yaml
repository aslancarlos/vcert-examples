# =============================================================================
# VCERT PLAYBOOK - Apache HTTP Server (httpd)
# =============================================================================
# Apache uses separate PEM files via these directives:
#   SSLCertificateFile       -> certificate
#   SSLCertificateKeyFile    -> private key
#   SSLCertificateChainFile  -> chain (intermediates)  [optional in newer versions]
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   vcert run -f playbooks/apache.yaml
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"

certificateTasks:
  - name: apache-certificate

    renewBefore: 30d

    request:
      csr: local
      subject:
        commonName: "www.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU
          - "Information Technology"
        locality: "New York"
        province: "NY"
        country: "US"
      keyType: rsa
      keySize: 2048
      sanDNS:
        - "www.yourcompany.com"
        - "yourcompany.com"
      validDays: 90
      zone: "Certificates\\Production\\Apache"

    installations:
      - format: PEM
        # Typical paths on RHEL/Rocky: /etc/pki/tls/...  | Debian/Ubuntu: /etc/ssl/...
        file: "/etc/pki/tls/certs/www.crt"
        chainFile: "/etc/pki/tls/certs/www-chain.crt"
        keyFile: "/etc/pki/tls/private/www.key"
        backupFiles: true

        # POST: validates the config and reloads Apache (graceful, no dropped connections).
        afterInstallAction: "/usr/local/bin/post-renew-apache.sh"
