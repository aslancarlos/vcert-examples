# =============================================================================
# VCERT PLAYBOOK - CyberArk Certificate Manager Self-Hosted (formerly TPP)
# =============================================================================
# Requests/renews a certificate, generates the CSR locally on Linux with the
# given details, installs the files, and runs PRE and POST actions on renewal.
#
# Run:
#   export VCERT_TOKEN="your_access_token"
#   vcert run -f playbooks/tpp-selfhosted.yaml
#
# Validate without applying:  vcert run -f playbooks/tpp-selfhosted.yaml --validate
# Force renewal:              vcert run -f playbooks/tpp-selfhosted.yaml --force-renew
# =============================================================================

config:
  connection:
    platform: tpp
    url: "https://tpp.yourcompany.com/vedsdk"
    credentials:
      # Generate the token:
      #   vcert getcred --username YOUR_USER --password 'PASSWORD' \
      #     -u https://tpp.yourcompany.com/vedsdk --client-id vcert-cli
      accessToken: "{{ Env \"VCERT_TOKEN\" }}"
      # trustBundle: "/etc/ssl/certs/cyberark-chain.pem"  # internal CA, if needed

certificateTasks:
  - name: web-app-certificate

    # === LEAD TIME TO START RENEWAL ===
    # Renews when this much time is left before expiry. Accepts "30d", "720h", or "10%".
    renewBefore: 30d

    request:
      # csr: local   -> generates the CSR and private key on this machine (recommended)
      # csr: service -> the platform generates the key
      csr: local

      # === CSR DETAILS (Subject / DN) ===
      subject:
        commonName: "app.yourcompany.com"
        organization: "Your Company Inc."           # O
        organizationalUnits:                         # OU (there may be several)
          - "Information Technology"
          - "Security"
        locality: "New York"                         # L
        province: "NY"                               # ST
        country: "US"                                # C

      # === ALGORITHM AND KEY SIZE ===
      keyType: rsa
      keySize: 2048          # 2048 / 3072 / 4096
      # ECDSA alternative (replace the two lines above):
      # keyType: ecdsa
      # keyCurve: P256       # P256 / P384 / P521

      # === SANs ===
      sanDNS:
        - "app.yourcompany.com"
        - "www.app.yourcompany.com"

      # === VALIDITY PERIOD (days) ===
      validDays: 90
      # issuerHint: DIGICERT   # use if the CA requires it for custom validity

      # === POLICY / ZONE ===
      zone: "Certificates\\Production\\WebApp"

    installations:
      - format: PEM
        file: "/etc/ssl/app/app.crt"
        chainFile: "/etc/ssl/app/chain.crt"
        keyFile: "/etc/ssl/app/app.key"
        backupFiles: true

        # === PRE-RENEWAL ACTION === (before installing the new certificate)
        beforeInstallAction: "/usr/local/bin/pre-renew.sh"

        # === POST-RENEWAL ACTION === (after installing; reloads the service)
        afterInstallAction: "/usr/local/bin/post-renew.sh"
