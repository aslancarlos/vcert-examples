name: yaml-lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate playbook YAML syntax
        run: |
          python3 - <<'PY'
          import sys, glob
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "pyyaml"])
              import yaml
          erros = 0
          for f in glob.glob("playbooks/*.yaml") + glob.glob(".github/workflows/*.yml"):
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))
                  print(f"OK  {f}")
              except Exception as e:
                  print(f"ERRO {f}: {e}")
                  erros += 1
          sys.exit(1 if erros else 0)
          PY
